<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relevamiento · Medical Química</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #F0F4FA; min-height: 100vh; }

  .header { background: #1B4FBB; padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header-sub { color: #A8BFEF; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .header-title { color: #fff; font-weight: 700; font-size: 17px; margin-top: 2px; }
  .progress-bar { width: 90px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4ECDC4; border-radius: 3px; transition: width 0.4s; }
  .progress-label { color: #A8BFEF; font-size: 11px; text-align: right; }

  .nav { display: flex; overflow-x: auto; background: #fff; border-bottom: 2px solid #E0E8F5; padding: 0 6px; -webkit-overflow-scrolling: touch; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn { flex-shrink: 0; padding: 10px 10px; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 11px; color: #888; white-space: nowrap; }
  .nav-btn.activo { border-bottom-color: #1B4FBB; color: #1B4FBB; font-weight: 700; }
  .nav-btn .nav-emoji { font-size: 20px; }
  .nav-progress { width: 24px; height: 3px; background: #1B4FBB; border-radius: 2px; opacity: 0; }
  .nav-progress.visible { opacity: 0.6; }
  .nav-progress.completo { background: #1A7A4A; opacity: 1; }

  .contenido { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
  .sec-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .sec-emoji { font-size: 32px; }
  .sec-title { font-size: 18px; font-weight: 700; color: #1A1A1A; }
  .sec-sub { font-size: 12px; color: #888; margin-top: 2px; }

  .campo { margin-bottom: 20px; }
  .campo-label { display: block; font-size: 14px; font-weight: 600; color: #1A1A1A; margin-bottom: 8px; line-height: 1.4; }
  .alerta-tag { display: inline-block; margin-left: 6px; font-size: 11px; background: #FFF3CD; color: #856404; padding: 2px 8px; border-radius: 10px; font-weight: 400; }

  input[type=text], input[type=date], textarea {
    width: 100%; padding: 13px 14px; border-radius: 10px; border: 2px solid #E0E8F5;
    font-size: 15px; outline: none; background: #fff; font-family: inherit;
    transition: border-color 0.2s;
  }
  input[type=text]:focus, input[type=date]:focus, textarea:focus { border-color: #1B4FBB; }
  input.filled, textarea.filled { border-color: #1B4FBB; }
  textarea { resize: vertical; min-height: 80px; }

  .sino-group, .semaforo-group { display: flex; gap: 10px; }
  .sino-btn, .semaforo-btn { flex: 1; padding: 14px 8px; border-radius: 12px; border: 2px solid #E0E8F5; background: #fff; color: #888; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .sino-btn.sel-si { border-color: #1A7A4A; background: #E6F4ED; color: #1A7A4A; }
  .sino-btn.sel-no { border-color: #C0392B; background: #FDECEA; color: #C0392B; }
  .semaforo-btn.sel-verde { border-color: #1A7A4A; background: #E6F4ED; color: #1A7A4A; }
  .semaforo-btn.sel-amarillo { border-color: #D4A017; background: #FFFBF0; color: #D4A017; }
  .semaforo-btn.sel-rojo { border-color: #C0392B; background: #FDECEA; color: #C0392B; }

  .escala-group { display: flex; gap: 8px; }
  .escala-btn { flex: 1; padding: 14px 0; border-radius: 10px; border: 2px solid #E0E8F5; background: #fff; color: #888; font-weight: 700; font-size: 16px; cursor: pointer; transition: all 0.2s; }
  .escala-btn.sel { border-color: #1B4FBB; background: #1B4FBB; color: #fff; }

  .opciones-group { display: flex; flex-direction: column; gap: 8px; }
  .opcion-btn { padding: 13px 16px; border-radius: 10px; border: 2px solid #E0E8F5; background: #fff; color: #555; font-size: 14px; text-align: left; cursor: pointer; transition: all 0.2s; }
  .opcion-btn.sel { border-color: #1B4FBB; background: #E8EEF9; color: #1B4FBB; font-weight: 700; }

  .multi-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .multi-btn { padding: 10px 16px; border-radius: 20px; border: 2px solid #E0E8F5; background: #fff; color: #555; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .multi-btn.sel { border-color: #1B4FBB; background: #1B4FBB; color: #fff; font-weight: 700; }

  .nav-actions { display: flex; gap: 12px; margin-top: 24px; margin-bottom: 40px; }
  .btn-prev { flex: 1; padding: 16px; border-radius: 12px; border: 2px solid #E0E8F5; background: #fff; color: #1B4FBB; font-weight: 700; font-size: 15px; cursor: pointer; }
  .btn-next { flex: 2; padding: 16px; border-radius: 12px; border: none; background: #1B4FBB; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; }
  .btn-copiar { flex: 2; padding: 16px; border-radius: 12px; border: none; background: #1B4FBB; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; }
  .btn-copiar.copiado { background: #1A7A4A; }

  .resumen-box { background: #fff; border-radius: 16px; padding: 20px; border: 2px solid #E0E8F5; margin-bottom: 24px; }
  .resumen-title { font-size: 14px; font-weight: 700; color: #1B4FBB; margin-bottom: 16px; }
  .resumen-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #F0F4FA; }
  .resumen-label { font-size: 14px; color: #555; }
  .badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
  .badge-verde { background: #E6F4ED; color: #1A7A4A; }
  .badge-amarillo { background: #FFFBF0; color: #D4A017; }
  .badge-rojo { background: #FDECEA; color: #C0392B; }

  .nota-tip { background: #E8EEF9; border-left: 4px solid #1B4FBB; border-radius: 0 10px 10px 0; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #1B4FBB; font-style: italic; }
  .pregunta-tip { background: #FFFBF0; border-left: 4px solid #D4A017; border-radius: 0 10px 10px 0; padding: 12px 16px; margin-bottom: 10px; font-size: 13px; color: #856404; }
  .pregunta-tip strong { display: block; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; color: #D4A017; }
  .pe-box { background: #1A1A2E; border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #4ECDC4; }
  .pe-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #4ECDC4; margin-bottom: 8px; font-weight: 700; display: block; }
  .pe-texto { font-size: 13px; color: #E8E8E0; line-height: 1.6; font-style: italic; }
  .pe-por-que { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.5; border-top: 1px solid #2A2A3E; padding-top: 8px; }
  .preguntas-bloque { margin-bottom: 8px; }
  .preguntas-titulo { font-size: 12px; font-weight: 700; color: #1B4FBB; margin-bottom: 10px; margin-top: 16px; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-sub">Relevamiento · Visita</div>
      <div class="header-title">Medical Química SA</div>
    </div>
    <div>
      <div class="progress-label" id="prog-label">0/46 campos</div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div class="nav" id="nav"></div>
<div class="contenido" id="contenido"></div>

<script>
const DATOS = {};
const MULTI = {};

const SECCIONES = [
  {
    id:"apertura", emoji:"🚪", titulo:"Antes de entrar",
    nota: "Observá esto en silencio antes de sentarte a hablar.",
    campos:[
      {id:"papeles", label:"¿Hay planillas o papeles físicos visibles?", tipo:"sino", alerta:"Procesos manuales"},
      {id:"excel", label:"¿Pantallas con Excel abiertas?", tipo:"sino", alerta:"Sin sistema de gestión"},
      {id:"stock_orden", label:"¿El depósito/stock parece organizado? (1=caos, 5=impecable)", tipo:"escala"},
      {id:"una_persona", label:"¿Una sola persona parece manejar todo?", tipo:"sino", alerta:"Cuello de botella operativo"},
      {id:"obs_llegada", label:"Otras observaciones al llegar", tipo:"nota"},
    ]
  },
  {
    id:"empresa", emoji:"🏢", titulo:"Datos generales",
    campos:[
      {id:"contacto", label:"Persona de contacto en la reunión", tipo:"texto", placeholder:"Laura Couchonnal"},
      {id:"cargo", label:"Cargo", tipo:"texto", placeholder:"Gerente"},
      {id:"fecha", label:"Fecha de visita", tipo:"fecha"},
      {id:"empleados", label:"¿Cuántas personas trabajan?", tipo:"opciones", ops:["1-3","4-7","8-15","15+"]},
      {id:"otros_presentes", label:"¿Quiénes más estuvieron en la reunión?", tipo:"nota", placeholder:"Nombres y cargos..."},
    ]
  },
  {
    id:"licitaciones", emoji:"📋", titulo:"Licitaciones DNCP",
    nota: "Tienen 150 adjudicaciones registradas. Usá eso como punto de partida.",
    pregunta_apertura: "\"Con tantas licitaciones adjudicadas, ¿cómo organizan el seguimiento de los pliegos activos? ¿Hay una persona que centraliza eso o está distribuido en el equipo?\"",
    pregunta_estrategica: {
      texto: "\"Procesar las adendas de última hora y las matrices de cumplimiento de la DNCP consume días críticos del equipo comercial. ¿Qué herramientas están usando hoy para que el análisis de pliegos no se convierta en un cuello de botella que les haga perder ventanas de oportunidad?\"",
      por_que: "Demuestra que conocés el proceso DNCP. Los obliga a hablar de su mayor dolor operativo sin que vos lo nombres como problema."
    },
    campos:[
      {id:"quien_licita", label:"¿Quién se encarga de las licitaciones?", tipo:"opciones", ops:["Una persona clave","Equipo dedicado","Todos colaboran","Tercerizan parcialmente"]},
      {id:"pliegos_perdidos", label:"¿Dijeron que pierden pliegos por falta de tiempo?", tipo:"sino", alerta:"Oportunidad directa de IA"},
      {id:"tiempo_pliego", label:"¿Cuánto tiempo lleva analizar un pliego?", tipo:"opciones", ops:["Menos de 1 hora","2-4 horas","Más de medio día","No lo saben exactamente"]},
      {id:"errores_dncp", label:"¿Tuvieron descalificaciones por errores de forma?", tipo:"sino", alerta:"Costo oculto alto"},
      {id:"conocimiento_clave", label:"Si se va la persona de licitaciones, ¿ese conocimiento queda o se va con ella?", tipo:"opciones", ops:["Queda en sistema","Queda en documentos","Se va con la persona","No lo habían pensado"]},
      {id:"licitaciones_nota", label:"Notas y frases clave sobre licitaciones", tipo:"nota"},
      {id:"dolor_licitaciones", label:"¿Es un dolor real para ellos?", tipo:"semaforo"},
    ]
  },
  {
    id:"stock", emoji:"📦", titulo:"Stock y vencimientos",
    nota: "Reactivos con fecha de caducidad estricta = su mayor riesgo financiero oculto.",
    pregunta_apertura: "\"Los reactivos tienen fechas de caducidad estrictas — ¿cómo saben hoy qué está por vencer antes de que sea un problema?\"",
    pregunta_estrategica: {
      texto: "\"Para insumos con fechas de caducidad estrictas y requisitos de cadena de frío orientados tanto a hospitales como a laboratorios industriales, la precisión en la previsión de la demanda es vital. ¿Cómo manejan actualmente las alertas tempranas para evitar pérdidas por obsolescencia?\"",
      por_que: "Conecta sus dos canales (salud e industria) en una sola pregunta. Demuestra que entendés la complejidad de su operación dual."
    },
    campos:[
      {id:"sistema_stock", label:"¿Cómo controlan el inventario hoy?", tipo:"opciones", ops:["Excel/planillas","Sistema propio","Software externo","De memoria","No saben exactamente"]},
      {id:"vencimientos", label:"¿Cómo controlan vencimientos de reactivos?", tipo:"opciones", ops:["Sistema automático con alertas","Excel manual","Visual/físico","No tienen control claro"]},
      {id:"quiebres", label:"¿Con qué frecuencia hay quiebres de stock?", tipo:"opciones", ops:["Casi nunca","1-2 veces por mes","Varias veces al mes","Es un problema frecuente"]},
      {id:"reactivos_vencidos", label:"¿Tuvieron pérdidas por reactivos vencidos?", tipo:"sino", alerta:"Impacto financiero directo"},
      {id:"cadena_frio", label:"¿Mencionaron problemas con la cadena de frío?", tipo:"sino", alerta:"Riesgo operativo crítico"},
      {id:"stock_nota", label:"Notas y frases clave sobre stock", tipo:"nota"},
      {id:"dolor_stock", label:"¿Es un dolor real para ellos?", tipo:"semaforo"},
    ]
  },
  {
    id:"ventas", emoji:"💼", titulo:"Ventas y cotizaciones",
    campos:[
      {id:"canal_pedidos", label:"¿Por dónde llegan los pedidos? (elegí todos)", tipo:"multi", ops:["WhatsApp","Email","Teléfono","Web","Presencial","DNCP directo"]},
      {id:"tiempo_cot", label:"¿Cuánto tarda una cotización?", tipo:"opciones", ops:["Menos de 1 hora","Mismo día","1-2 días","Más de 2 días","Variable"]},
      {id:"catalogo", label:"¿Tienen catálogo actualizado?", tipo:"opciones", ops:["Sí, siempre actualizado","Sí pero desactualizado","Lo arman cada vez","No tienen"]},
      {id:"seguimiento_cot", label:"¿Hacen seguimiento de cotizaciones enviadas?", tipo:"sino", alerta:"Ventas que se pierden sin saberlo"},
      {id:"ventas_nota", label:"Notas y frases clave sobre ventas", tipo:"nota"},
      {id:"dolor_ventas", label:"¿Es un dolor real para ellos?", tipo:"semaforo"},
    ]
  },
  {
    id:"ia", emoji:"🤖", titulo:"IA y automatización",
    nota: "Esta es la razón por la que te contactaron. Escuchá más de lo que hablás.",
    pregunta_apertura: "\"¿El equipo ya usa herramientas como ChatGPT para agilizar trabajo — resumir pliegos, traducir fichas técnicas, preparar documentos?\"",
    pregunta_estrategica: {
      texto: "\"El uso de IAs abiertas como ChatGPT está explotando en los mandos medios corporativos en Paraguay para resumir contratos, traducir fichas técnicas o responder reclamos. ¿Tiene hoy el Directorio visibilidad de cuánta información de Medical Química se está procesando en plataformas externas que no garantizan la propiedad intelectual?\"",
      por_que: "Es la pregunta más disruptiva de la reunión. Ningún director tiene buena respuesta para esto. Abre la puerta directa a tu propuesta de IA corporativa privada."
    },
    campos:[
      {id:"que_quieren", label:"¿Qué proceso específico mencionaron al hablar de IA?", tipo:"nota", placeholder:"Escribí textualmente lo que dijeron..."},
      {id:"usan_ia", label:"¿Ya usan alguna herramienta de IA?", tipo:"opciones", ops:["No, ninguna","ChatGPT ocasional","Varias herramientas","Sí, tienen procesos automatizados","No saben qué usan sus empleados"]},
      {id:"datos_sensibles", label:"¿Mencionaron preocupación por datos sensibles o confidencialidad?", tipo:"sino", alerta:"Entrada perfecta para IA corporativa privada"},
      {id:"tarea_pesada", label:"¿Cuál es la tarea que más tiempo les consume?", tipo:"nota"},
      {id:"cambio_uno", label:"Si cambiarían UNA sola cosa de la operación, ¿cuál sería?", tipo:"nota"},
      {id:"urgencia", label:"Nivel de urgencia percibido (1=baja, 5=urgente ya)", tipo:"escala"},
      {id:"presupuesto", label:"¿Mencionaron presupuesto?", tipo:"opciones", ops:["Sí, dieron número","Tienen budget disponible","No mencionaron","Dijeron que es una traba","Lo decidirá otra persona"]},
    ]
  },
  {
    id:"cierre", emoji:"🎯", titulo:"Cierre y próximos pasos",
    campos:[
      {id:"dolor_principal", label:"Dolor principal detectado", tipo:"nota", placeholder:"El problema más grande que viste o escuchaste..."},
      {id:"frase_clave", label:"Frase clave que dijeron — textual", tipo:"nota", placeholder:"Algo que dijeron que lo resume todo..."},
      {id:"oportunidad_ia", label:"Mejor oportunidad de IA identificada", tipo:"nota"},
      {id:"propuesta_posible", label:"¿Qué propuesta tiene más sentido ofrecerles?", tipo:"opciones", ops:["Diagnóstico operativo completo","Automatización de licitaciones","Control de stock con IA","IA corporativa privada y segura","Mystery Shopper del proceso de ventas","Aún no está claro"]},
      {id:"proximo_paso", label:"Próximo paso acordado", tipo:"opciones", ops:["Envío propuesta en 48hs","Segunda reunión agendada","Esperan mi diagnóstico","Están evaluando","No hubo paso concreto"]},
      {id:"fit", label:"¿Hay fit real para trabajar juntos?", tipo:"semaforo"},
      {id:"impresion", label:"Impresión general de la visita", tipo:"nota"},
    ]
  }
];

let secActiva = 0;

function totalCampos() { return SECCIONES.reduce((s,sec) => s + sec.campos.length, 0); }

function completadosSec(sec) {
  return sec.campos.filter(c => {
    if (c.tipo === "multi") return (MULTI[c.id] || []).length > 0;
    return DATOS[c.id] && DATOS[c.id] !== "";
  }).length;
}

function totalCompletados() { return SECCIONES.reduce((s,sec) => s + completadosSec(sec), 0); }

function actualizarProgreso() {
  const total = totalCampos(), comp = totalCompletados();
  document.getElementById("prog-fill").style.width = Math.round(comp/total*100) + "%";
  document.getElementById("prog-label").textContent = comp + "/" + total + " campos";
}

function renderNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  SECCIONES.forEach((sec,i) => {
    const comp = completadosSec(sec), total = sec.campos.length;
    const pct = Math.round(comp/total*100);
    const btn = document.createElement("button");
    btn.className = "nav-btn" + (i === secActiva ? " activo" : "");
    btn.innerHTML = `<span class="nav-emoji">${sec.emoji}</span><span>${sec.titulo.split(" ")[0]}</span><div class="nav-progress ${pct>0?"visible":""} ${pct===100?"completo":""}"></div>`;
    btn.onclick = () => { secActiva = i; render(); window.scrollTo(0,0); };
    nav.appendChild(btn);
  });
}

function crearCampo(campo) {
  const div = document.createElement("div");
  div.className = "campo";
  const label = document.createElement("label");
  label.className = "campo-label";
  label.textContent = campo.label;
  if (campo.alerta && campo.tipo === "sino" && DATOS[campo.id] === "si") {
    const tag = document.createElement("span");
    tag.className = "alerta-tag";
    tag.textContent = "⚠️ " + campo.alerta;
    label.appendChild(tag);
  }
  div.appendChild(label);

  if (campo.tipo === "texto") {
    const inp = document.createElement("input");
    inp.type = "text"; inp.placeholder = campo.placeholder || ""; inp.value = DATOS[campo.id] || "";
    if (inp.value) inp.classList.add("filled");
    inp.oninput = () => { DATOS[campo.id] = inp.value; inp.classList.toggle("filled", !!inp.value); actualizarProgreso(); renderNav(); };
    div.appendChild(inp);
  } else if (campo.tipo === "fecha") {
    const inp = document.createElement("input");
    inp.type = "date"; inp.value = DATOS[campo.id] || "";
    if (inp.value) inp.classList.add("filled");
    inp.onchange = () => { DATOS[campo.id] = inp.value; inp.classList.toggle("filled", !!inp.value); actualizarProgreso(); renderNav(); };
    div.appendChild(inp);
  } else if (campo.tipo === "nota") {
    const ta = document.createElement("textarea");
    ta.placeholder = campo.placeholder || "Escribí acá..."; ta.value = DATOS[campo.id] || "";
    if (ta.value) ta.classList.add("filled");
    ta.oninput = () => { DATOS[campo.id] = ta.value; ta.classList.toggle("filled", !!ta.value); actualizarProgreso(); renderNav(); };
    div.appendChild(ta);
  } else if (campo.tipo === "sino") {
    const grp = document.createElement("div"); grp.className = "sino-group";
    ["si","no"].forEach(op => {
      const btn = document.createElement("button");
      btn.className = "sino-btn" + (DATOS[campo.id] === op ? " sel-"+op : "");
      btn.textContent = op === "si" ? "✓ Sí" : "✗ No";
      btn.onclick = () => { DATOS[campo.id] = op; actualizarProgreso(); renderNav(); renderContenido(); };
      grp.appendChild(btn);
    });
    div.appendChild(grp);
  } else if (campo.tipo === "semaforo") {
    const grp = document.createElement("div"); grp.className = "semaforo-group";
    [["verde","🟢 Sí, claro"],["amarillo","🟡 Tal vez"],["rojo","🔴 No tanto"]].forEach(([k,lbl]) => {
      const btn = document.createElement("button");
      btn.className = "semaforo-btn" + (DATOS[campo.id] === k ? " sel-"+k : "");
      btn.textContent = lbl;
      btn.onclick = () => { DATOS[campo.id] = k; actualizarProgreso(); renderNav(); renderContenido(); };
      grp.appendChild(btn);
    });
    div.appendChild(grp);
  } else if (campo.tipo === "escala") {
    const grp = document.createElement("div"); grp.className = "escala-group";
    const val = parseInt(DATOS[campo.id]) || 0;
    [1,2,3,4,5].forEach(n => {
      const btn = document.createElement("button");
      btn.className = "escala-btn" + (val >= n ? " sel" : "");
      btn.textContent = n;
      btn.onclick = () => { DATOS[campo.id] = n; actualizarProgreso(); renderNav(); renderContenido(); };
      grp.appendChild(btn);
    });
    div.appendChild(grp);
  } else if (campo.tipo === "opciones") {
    const grp = document.createElement("div"); grp.className = "opciones-group";
    campo.ops.forEach(op => {
      const btn = document.createElement("button");
      btn.className = "opcion-btn" + (DATOS[campo.id] === op ? " sel" : "");
      btn.textContent = (DATOS[campo.id] === op ? "◉ " : "○ ") + op;
      btn.onclick = () => { DATOS[campo.id] = op; actualizarProgreso(); renderNav(); renderContenido(); };
      grp.appendChild(btn);
    });
    div.appendChild(grp);
  } else if (campo.tipo === "multi") {
    if (!MULTI[campo.id]) MULTI[campo.id] = [];
    const grp = document.createElement("div"); grp.className = "multi-group";
    campo.ops.forEach(op => {
      const sel = MULTI[campo.id].includes(op);
      const btn = document.createElement("button");
      btn.className = "multi-btn" + (sel ? " sel" : "");
      btn.textContent = (sel ? "✓ " : "") + op;
      btn.onclick = () => {
        if (MULTI[campo.id].includes(op)) MULTI[campo.id] = MULTI[campo.id].filter(x => x !== op);
        else MULTI[campo.id].push(op);
        actualizarProgreso(); renderNav(); renderContenido();
      };
      grp.appendChild(btn);
    });
    div.appendChild(grp);
  }
  return div;
}

function renderContenido() {
  const sec = SECCIONES[secActiva];
  const cont = document.getElementById("contenido");
  cont.innerHTML = "";

  const hdr = document.createElement("div"); hdr.className = "sec-header";
  hdr.innerHTML = `<span class="sec-emoji">${sec.emoji}</span><div><div class="sec-title">${sec.titulo}</div><div class="sec-sub">${completadosSec(sec)}/${sec.campos.length} completados</div></div>`;
  cont.appendChild(hdr);

  if (sec.nota) {
    const tip = document.createElement("div"); tip.className = "nota-tip";
    tip.textContent = "💡 " + sec.nota; cont.appendChild(tip);
  }

  if (sec.pregunta_apertura) {
    const ptip = document.createElement("div"); ptip.className = "pregunta-tip";
    ptip.innerHTML = `<strong>🎤 Pregunta para abrir esta sección</strong>${sec.pregunta_apertura}`;
    cont.appendChild(ptip);
  }
  if (sec.pregunta_estrategica) {
    const pe = document.createElement("div"); pe.className = "pe-box";
    pe.innerHTML = `<span class="pe-label">⚡ Pregunta estratégica de alto impacto</span><div class="pe-texto">${sec.pregunta_estrategica.texto}</div><div class="pe-por-que">💡 <strong>Por qué funciona:</strong> ${sec.pregunta_estrategica.por_que}</div>`;
    cont.appendChild(pe);
  }

  sec.campos.forEach(c => cont.appendChild(crearCampo(c)));

  if (secActiva === SECCIONES.length - 1) {
    const box = document.createElement("div"); box.className = "resumen-box";
    box.innerHTML = `<div class="resumen-title">📊 Resumen de dolores detectados</div>`;
    [["licitaciones","📋 Licitaciones"],["stock","📦 Stock"],["ventas","💼 Ventas"]].forEach(([id, lbl]) => {
      const v = DATOS["dolor_"+id]; if (!v) return;
      const badges = {verde:"badge-verde",amarillo:"badge-amarillo",rojo:"badge-rojo"};
      const labels = {verde:"Sí, claro 🟢",amarillo:"Tal vez 🟡",rojo:"No tanto 🔴"};
      const row = document.createElement("div"); row.className = "resumen-row";
      row.innerHTML = `<span class="resumen-label">${lbl}</span><span class="badge ${badges[v]}">${labels[v]}</span>`;
      box.appendChild(row);
    });
    cont.appendChild(box);
  }

  const actions = document.createElement("div"); actions.className = "nav-actions";
  if (secActiva > 0) {
    const prev = document.createElement("button"); prev.className = "btn-prev"; prev.textContent = "← Anterior";
    prev.onclick = () => { secActiva--; render(); window.scrollTo(0,0); };
    actions.appendChild(prev);
  }
  if (secActiva < SECCIONES.length - 1) {
    const next = document.createElement("button"); next.className = "btn-next"; next.textContent = "Siguiente →";
    next.onclick = () => { secActiva++; render(); window.scrollTo(0,0); };
    actions.appendChild(next);
  } else {
    const copiar = document.createElement("button"); copiar.className = "btn-copiar";
    copiar.textContent = "📋 Copiar resumen completo";
    copiar.onclick = () => {
      let txt = "=== RELEVAMIENTO MEDICAL QUÍMICA SA ===\n\n";
      SECCIONES.forEach(sec => {
        txt += "--- " + sec.titulo.toUpperCase() + " ---\n";
        sec.campos.forEach(c => {
          const v = c.tipo === "multi" ? (MULTI[c.id]||[]).join(", ") : DATOS[c.id];
          if (v && v !== "") txt += c.label + ": " + v + "\n";
        });
        txt += "\n";
      });
      navigator.clipboard.writeText(txt).then(() => {
        copiar.textContent = "✓ Copiado al portapapeles";
        copiar.classList.add("copiado");
        setTimeout(() => { copiar.textContent = "📋 Copiar resumen completo"; copiar.classList.remove("copiado"); }, 3000);
      }).catch(() => { alert("Seleccioná el texto manualmente."); });
    };
    actions.appendChild(copiar);
  }
  cont.appendChild(actions);
}

function render() { renderNav(); renderContenido(); actualizarProgreso(); }
render();
</script>
</body>
</html>
